spring:
  datasource:
    url: jdbc:h2:file:./data/easyboot;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: true

logging:
  level:
    io.github.dyskaura.easyboot: debug
