spring:
  application:
    name: easyboot
  profiles:
    default: dev
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

easyboot:
  jwt:
    # 生产环境必须通过 JWT_SECRET 环境变量修改。值必须是 Base64，解码后不少于 32 字节。
    secret: ${JWT_SECRET:ZWFzeWJvb3QtZGV2ZWxvcG1lbnQtc2VjcmV0LWtleS1jaGFuZ2UtbWU=}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
