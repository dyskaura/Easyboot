services:
  mysql:
    image: mysql:8.4
    container_name: easyboot-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: easyboot
      MYSQL_ROOT_PASSWORD: easyboot
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - easyboot-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-peasyboot"]
      interval: 10s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7.4-alpine
    container_name: easyboot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - easyboot-redis-data:/data

volumes:
  easyboot-mysql-data:
  easyboot-redis-data:
